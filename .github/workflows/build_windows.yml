name: Build Windows EXE with Playwright

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pyinstaller

      - name: Install Playwright browser
        run: |
          playwright install chromium

      - name: Build EXE with embedded browser
        run: |
          pyinstaller --onefile `
            --name instabrut_connect `
            --add-data "$env:USERPROFILE\AppData\Local\ms-playwright;playwright\driver" `
            --hidden-import=playwright `
            --hidden-import=playwright.sync_api `
            instabrut_connect.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: instabrut-win
          path: dist/instabrut_connect.exe

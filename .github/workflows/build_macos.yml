name: Build macOS .app

on:
  push:
    branches: [master, main]
    paths:
      - 'instabrut_connect.py'
      - '.github/workflows/build_macos.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pyinstaller
          playwright install chromium

      - name: Build .app
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "InstabrutConnect" \
            --hidden-import playwright \
            --hidden-import playwright.sync_api \
            instabrut_connect.py

      - name: Package .app into ZIP
        run: |
          cd dist
          zip -r InstabrutConnect_macOS.zip InstabrutConnect.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InstabrutConnect_macOS
          path: dist/InstabrutConnect_macOS.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InstabrutConnect_macOS.zip
          generate_release_notes: true
